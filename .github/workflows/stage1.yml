name: Build Stage1 LLVM

on:
  workflow_dispatch:
    inputs:
      llvm_tag:
        description: "LLVM tag (e.g. llvmorg-18.1.3)"
        required: true
        default: "llvmorg-22.1.6"

jobs:
  build-stage1:
    runs-on: windows-latest

    steps:
    - name: Checkout llvm-project
      uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        ref: ${{ github.event.inputs.llvm_tag }}
        submodules: recursive

    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Configure Stage1 LLVM (with MSVC)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        cmake -G Ninja -S llvm -B stage1 ^
          -DLLVM_ENABLE_PROJECTS="clang" ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DLLVM_TARGETS_TO_BUILD="X86" ^
          -DCMAKE_C_COMPILER=cl.exe ^
          -DCMAKE_CXX_COMPILER=cl.exe



    - name: Build TableGen Tools
      run: |
        ninja -C stage1 llvm-tblgen clang-tblgen

    - name: Upload Stage1 TableGen Tools
      uses: actions/upload-artifact@v4
      with:
        name: stage1-tablegen-${{ github.event.inputs.llvm_tag }}
        path: stage1/bin
